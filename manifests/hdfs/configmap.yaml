# Hadoop site configs for the minimal HDFS + YARN learning module (Phase 7,
# Design Appendix G). Mounted file-by-file (subPath) into /opt/hadoop/etc/hadoop
# so the image's other conf files (hadoop-env.sh, log4j) stay intact.
apiVersion: v1
kind: ConfigMap
metadata:
  name: hadoop-conf
  namespace: hdfs
data:
  core-site.xml: |
    <?xml version="1.0"?>
    <configuration>
      <property>
        <name>fs.defaultFS</name>
        <value>hdfs://hdfs-namenode-0.hdfs-namenode:8020</value>
      </property>
    </configuration>
  hdfs-site.xml: |
    <?xml version="1.0"?>
    <configuration>
      <property><name>dfs.replication</name><value>1</value></property>
      <property><name>dfs.namenode.name.dir</name><value>file:///hadoop/dfs/name</value></property>
      <property><name>dfs.datanode.data.dir</name><value>file:///hadoop/dfs/data</value></property>
      <property><name>dfs.namenode.rpc-bind-host</name><value>0.0.0.0</value></property>
      <property><name>dfs.namenode.http-bind-host</name><value>0.0.0.0</value></property>
      <property><name>dfs.datanode.use.datanode.hostname</name><value>false</value></property>
      <property><name>dfs.permissions.enabled</name><value>false</value></property>
    </configuration>
  yarn-site.xml: |
    <?xml version="1.0"?>
    <configuration>
      <property><name>yarn.resourcemanager.hostname</name><value>hdfs-yarn-rm</value></property>
      <property><name>yarn.resourcemanager.bind-host</name><value>0.0.0.0</value></property>
      <property><name>yarn.nodemanager.bind-host</name><value>0.0.0.0</value></property>
      <property><name>yarn.nodemanager.aux-services</name><value>mapreduce_shuffle</value></property>
      <property><name>yarn.nodemanager.resource.memory-mb</name><value>4096</value></property>
      <property><name>yarn.nodemanager.resource.cpu-vcores</name><value>2</value></property>
      <property><name>yarn.nodemanager.vmem-check-enabled</name><value>false</value></property>
    </configuration>
  mapred-site.xml: |
    <?xml version="1.0"?>
    <configuration>
      <property><name>mapreduce.framework.name</name><value>yarn</value></property>
      <property><name>yarn.app.mapreduce.am.env</name><value>HADOOP_MAPRED_HOME=/opt/hadoop</value></property>
      <property><name>mapreduce.map.env</name><value>HADOOP_MAPRED_HOME=/opt/hadoop</value></property>
      <property><name>mapreduce.reduce.env</name><value>HADOOP_MAPRED_HOME=/opt/hadoop</value></property>
    </configuration>
