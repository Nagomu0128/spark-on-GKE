# Minimal HDFS: 1 NameNode + 1 DataNode (Phase 7, Design Appendix G). Learning
# only — stateful, run on demand and delete afterward (see manifests/hdfs/README.md).
# pd-standard PVCs keep this off the small SSD_TOTAL_GB quota.
apiVersion: v1
kind: Service
metadata:
  name: hdfs-namenode
  namespace: hdfs
spec:
  clusterIP: None # headless: stable DNS hdfs-namenode-0.hdfs-namenode
  selector:
    app: hdfs-namenode
  ports:
    - { name: rpc, port: 8020 }
    - { name: http, port: 9870 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hdfs-namenode
  namespace: hdfs
spec:
  serviceName: hdfs-namenode
  replicas: 1
  selector:
    matchLabels:
      app: hdfs-namenode
  template:
    metadata:
      labels:
        app: hdfs-namenode
    spec:
      securityContext:
        fsGroup: 1000 # apache/hadoop runs as uid/gid 1000 -> writable PVC
      initContainers:
        - name: format
          image: apache/hadoop:3.3.6
          command:
            - bash
            - -c
            - "test -d /hadoop/dfs/name/current || /opt/hadoop/bin/hdfs namenode -format -force -nonInteractive"
          volumeMounts:
            - { name: name-dir, mountPath: /hadoop/dfs }
            - { name: hadoop-conf, mountPath: /opt/hadoop/etc/hadoop/core-site.xml, subPath: core-site.xml }
            - { name: hadoop-conf, mountPath: /opt/hadoop/etc/hadoop/hdfs-site.xml, subPath: hdfs-site.xml }
      containers:
        - name: namenode
          image: apache/hadoop:3.3.6
          command: ["/opt/hadoop/bin/hdfs", "namenode"]
          ports:
            - { containerPort: 8020 }
            - { containerPort: 9870 }
          resources:
            requests: { cpu: "250m", memory: "768Mi" }
            limits: { memory: "1536Mi" }
          volumeMounts:
            - { name: name-dir, mountPath: /hadoop/dfs }
            - { name: hadoop-conf, mountPath: /opt/hadoop/etc/hadoop/core-site.xml, subPath: core-site.xml }
            - { name: hadoop-conf, mountPath: /opt/hadoop/etc/hadoop/hdfs-site.xml, subPath: hdfs-site.xml }
      volumes:
        - name: hadoop-conf
          configMap:
            name: hadoop-conf
  volumeClaimTemplates:
    - metadata:
        name: name-dir
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard # pd-standard (off SSD quota)
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: hdfs-datanode
  namespace: hdfs
spec:
  clusterIP: None
  selector:
    app: hdfs-datanode
  ports:
    - { name: data, port: 9866 }
    - { name: http, port: 9864 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hdfs-datanode
  namespace: hdfs
spec:
  serviceName: hdfs-datanode
  replicas: 1
  selector:
    matchLabels:
      app: hdfs-datanode
  template:
    metadata:
      labels:
        app: hdfs-datanode
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: datanode
          image: apache/hadoop:3.3.6
          command: ["/opt/hadoop/bin/hdfs", "datanode"]
          ports:
            - { containerPort: 9866 }
            - { containerPort: 9864 }
          resources:
            requests: { cpu: "250m", memory: "768Mi" }
            limits: { memory: "1536Mi" }
          volumeMounts:
            - { name: data-dir, mountPath: /hadoop/dfs }
            - { name: hadoop-conf, mountPath: /opt/hadoop/etc/hadoop/core-site.xml, subPath: core-site.xml }
            - { name: hadoop-conf, mountPath: /opt/hadoop/etc/hadoop/hdfs-site.xml, subPath: hdfs-site.xml }
      volumes:
        - name: hadoop-conf
          configMap:
            name: hadoop-conf
  volumeClaimTemplates:
    - metadata:
        name: data-dir
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 5Gi
