# Skew-experiment aggregate (Phase 5, Design §9). Rendered by infra/run-skew.sh
# (envsubst) for SALT=1 (baseline, skewed) and SALT=16 (salted, balanced). The
# two runs get distinct names so both event logs appear in the History Server
# for a side-by-side comparison. Mirrors manifests/sparkjob.yaml but pins the
# aggregate job and threads --salt through.
apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: agg-salt${SALT}-${RUN_DATE_NODASH}
  namespace: spark-jobs
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/spark/spark-gcs:${SPARK_VERSION}
  imagePullPolicy: IfNotPresent
  mainApplicationFile: local:///opt/spark/jobs/aggregate.py
  arguments:
    - "--run-date"
    - "${RUN_DATE}"
    - "--lake"
    - "gs://${PROJECT_ID}-datalake"
    - "--salt"
    - "${SALT}"
  sparkVersion: "${SPARK_VERSION}"
  timeToLiveSeconds: 86400
  restartPolicy:
    type: Never
  sparkConf:
    "spark.sql.adaptive.enabled": "true"
    "spark.sql.adaptive.skewJoin.enabled": "true"
    "spark.sql.adaptive.coalescePartitions.enabled": "true"
    "spark.sql.shuffle.partitions": "200"
    "spark.sql.sources.partitionOverwriteMode": "dynamic"
    "spark.eventLog.enabled": "true"
    "spark.eventLog.dir": "gs://${PROJECT_ID}-datalake/spark-events/"
    "spark.hadoop.fs.gs.impl": "com.google.cloud.hadoop.fs.gcs.GoogleHadoopFileSystem"
    "spark.hadoop.fs.AbstractFileSystem.gs.impl": "com.google.cloud.hadoop.fs.gcs.GoogleHadoopFS"
    "spark.hadoop.fs.gs.auth.type": "APPLICATION_DEFAULT"
  driver:
    cores: 1
    memory: "2g"
    serviceAccount: spark
  executor:
    cores: 2
    instances: 4
    memory: "4g"
    serviceAccount: spark
    nodeSelector:
      workload: spark
    tolerations:
      - key: workload
        operator: Equal
        value: spark
        effect: NoSchedule
      - key: cloud.google.com/gke-spot
        operator: Equal
        value: "true"
        effect: NoSchedule
