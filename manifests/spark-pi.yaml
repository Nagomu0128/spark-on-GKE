# Smoke test (P1.12): confirms the operator runs a job, the driver lands on the
# system pool, and an executor schedules onto the tainted Spot spark pool.
apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: spark-pi
  namespace: spark-jobs
spec:
  type: Scala
  mode: cluster
  image: apache/spark:3.5.6
  imagePullPolicy: IfNotPresent
  mainClass: org.apache.spark.examples.SparkPi
  mainApplicationFile: "local:///opt/spark/examples/jars/spark-examples_2.12-3.5.6.jar"
  arguments: ["100"]
  sparkVersion: "3.5.6"
  restartPolicy:
    type: Never
  driver:
    cores: 1
    memory: "512m"
    serviceAccount: spark
    # No toleration for the spark taint -> scheduled on the system pool.
  executor:
    cores: 1
    instances: 1
    memory: "512m"
    serviceAccount: spark
    nodeSelector:
      workload: spark
    tolerations:
      - key: workload
        operator: Equal
        value: spark
        effect: NoSchedule
      # GKE auto-taints Spot node pools; pods must tolerate this or stay Pending.
      - key: cloud.google.com/gke-spot
        operator: Equal
        value: "true"
        effect: NoSchedule
