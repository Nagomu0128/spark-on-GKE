# Airflow Helm values (P4.1). KubernetesExecutor + git-synced DAGs.
executor: KubernetesExecutor

# DAGs are pulled from this repo (public) so no image rebuild is needed to ship a DAG.
dags:
  gitSync:
    enabled: true
    repo: https://github.com/Nagomu0128/spark-on-GKE.git
    branch: main
    subPath: dags

# The DAG reads these (project/region/image tag). REPLACE_ME before installing.
env:
  - name: GCP_PROJECT_ID
    value: "REPLACE_ME"
  - name: GCP_REGION
    value: "asia-northeast1"
  - name: SPARK_VERSION
    value: "3.5.6"

# Keep the learning install light. Postgres ships with the chart (fine for learning).
redis:
  enabled: false

# Bitnami removed old versioned tags from docker.io/bitnami in 2025 (moved to the
# bitnamilegacy mirror), so the chart's pinned postgres tag now 404s on Docker Hub.
# Pull the same tag from bitnamilegacy to keep the bundled DB working.
postgresql:
  image:
    repository: bitnamilegacy/postgresql

# With `helm --wait`, running DB migrations as a post-install hook deadlocks: the
# scheduler/webserver initContainers wait for migrations, but post-install hooks
# only run after --wait finishes. Run the migration as a normal Job so it applies
# during install and the initContainers can proceed.
migrateDatabaseJob:
  useHelmHooks: false
